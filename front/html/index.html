<!DOCTYPE html>
<html>
<head>
    <title>Calculadora</title>

    <link
        rel="stylesheet"
        href="../css/s.css"
    >
</head>

<body>

<div class="container">

    <h2>Calculadora</h2>

    <h1>99%</h1>

    <label>Expressao numerica</label>

    <input
        type="text"
        id="expression"
        placeholder="Ex: (2 + 3) * 4"
    >

    <label>Primeiro número</label>

    <input
        type="number"
        id="a"
        placeholder="Digite o primeiro número"
    >

    <label>Operação</label>

    <select
        id="operation"
        onchange="toggleSecondInput()"
    >

        <option value="+">
            Somar (+)
        </option>

        <option value="-">
            Subtrair (-)
        </option>

        <option value="*">
            Multiplicar (*)
        </option>

        <option value="/">
            Dividir (/)
        </option>

        <option value="sqrt">
            Raiz Quadrada (√)
        </option>

        <option value="^">
            Potência (^)
        </option>

        <option value="root">
            Raiz n-esima
        </option>

    </select>

    <div id="secondInputContainer">

        <label>Segundo número</label>

        <input
            type="number"
            id="b"
            placeholder="Digite o segundo número"
        >

    </div>

    <button onclick="calculate()">
        Calcular
    </button>

    <p
        id="result"
        class="result"
    ></p>

    <button onclick="loadHistory()">
        Atualizar Histórico
    </button>

    <ul id="history"></ul>

    <h3>Ranking de operacoes</h3>

    <button onclick="loadRanking()">
        Atualizar Ranking
    </button>

    <ul id="ranking"></ul>

    <button onclick="logout()">
        Sair
    </button>

</div>

<script src="../js/s.js"></script>

</body>
</html>
