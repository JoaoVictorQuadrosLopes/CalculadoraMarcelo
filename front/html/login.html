<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/s.css">
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <input 
        type="email"
        id="username"
        placeholder="Email"
    >

    <input 
        type="password"
        id="password"
        placeholder="Senha"
    >

    <p>
        Não possui conta?
        <a href="register.html">
            Registrar
        </a>
    </p>

    <button onclick="login()">
        Entrar
    </button>

</div>

<script src="../js/s.js"></script>

</body>
</html>
