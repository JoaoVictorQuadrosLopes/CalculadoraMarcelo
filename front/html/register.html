<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="../css/s.css">
</head>

<body>

<div class="container">

    <h2>Cadastro</h2>

    <input
        type="text"
        id="registerUsername"
        placeholder="Nome"
    >

    <input
        type="email"
        id="registerEmail"
        placeholder="Email"
    >

    <input
        type="password"
        id="registerPassword"
        placeholder="Senha"
    >

    <p>
        Já possui conta?
        <a href="login.html">
            Entrar
        </a>
    </p>

    <button onclick="register()">
        Cadastrar
    </button>

</div>

<script src="../js/s.js"></script>

</body>
</html>
