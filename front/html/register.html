<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet" href="../css/s.css">
</head>

<body>

    <div class="container">

        <h1>Criar Conta</h1>

        <input
            type="text"
            id="registerUsername"
            placeholder="Usuário"
        >

        <input
            type="password"
            id="registerPassword"
            placeholder="Senha"
        >

        <button onclick="register()">
            Registrar
        </button>

        <p>
            Já possui conta?
            <a href="login.html">
                Fazer Login
            </a>
        </p>

    </div>

    <script src="../js/s.js"></script>

</body>
</html>
